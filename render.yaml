services:
  - type: web
    name: saraswati-backend
    runtime: python
    python:
      version: "3.11.12"
    # Install dependencies from requirements.txt
    buildCommand: "pip install -r requirements.txt"
    # Start command launches uvicorn on Render's assigned $PORT
    startCommand: "python -m uvicorn research.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_PATH
        value: /data/saraswati.db
      - key: PYTHON_VERSION
        value: "3.11.12"
      # Fill these in on the Render Dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
    disk:
      name: saraswati-db-volume
      mountPath: /data
      sizeGB: 1

# Keep-alive cron: pings /health every 14 minutes to prevent free-tier spin-down
# NOTE: Render free tier cron jobs are limited. If this doesn't work,
# use https://cron-job.org (free) to hit your /health endpoint instead.
