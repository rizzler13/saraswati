[build]
  base = "ui/"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

# Environment variable for Vite build — set this in the Netlify Dashboard:
#   VITE_API_URL = https://saraswati-backend.onrender.com
#   VITE_FIREBASE_API_KEY = AIzaSy...
#   VITE_FIREBASE_AUTH_DOMAIN = saraswati-593cc.firebaseapp.com
#   VITE_FIREBASE_PROJECT_ID = saraswati-593cc
#   VITE_FIREBASE_STORAGE_BUCKET = saraswati-593cc.firebasestorage.app
#   VITE_FIREBASE_MESSAGING_SENDER_ID = 885287552665
#   VITE_FIREBASE_APP_ID = 1:885287552665:web:8096c5bfbf03150dadda08

# Proxy API requests to Render backend to avoid CORS and env configuration issues
[[redirects]]
  from = "/api/*"
  to = "https://saraswati-0tnd.onrender.com/api/:splat"
  status = 200
  force = true

# SPA redirect: all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
