services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saraswati-backend
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_PATH=/app/data/saraswati.db
      # Load keys from the host shell/env file
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: saraswati-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
