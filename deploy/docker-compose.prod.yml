services:
  memgraph:
    image: memgraph/memgraph:latest
    container_name: saraswati-memgraph
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
      - ../db:/db:ro
    environment:
      - MEMGRAPH=--log-level=WARNING --memory-limit=${MG_MEMORY_LIMIT:-1800}
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    mem_limit: 2g
    memswap_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/7687"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - saraswati-net

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/rizzler13/saraswati-backend:latest}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: saraswati-backend
    expose:
      - "8080"
    depends_on:
      memgraph:
        condition: service_healthy
    volumes:
      - ./config.prod.json:/etc/saraswati/config.json:ro
      - backend_data:/usr/local/bin/data
      - backend_logs:/usr/local/bin/logs
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - MG_HOST=memgraph
      - MG_PORT=7687
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - saraswati-net

  caddy:
    image: caddy:2-alpine
    container_name: saraswati-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saraswati-net

volumes:
  memgraph_data:
  memgraph_log:
  backend_data:
  backend_logs:
  caddy_data:
  caddy_config:

networks:
  saraswati-net:
    driver: bridge
